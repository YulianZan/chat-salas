services:
  postgres:
    image: postgres:16
    container_name: reservas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: reservas_db
      POSTGRES_USER: reservas_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reservas_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reservas_user -d reservas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: reservas-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://reservas_user:${POSTGRES_PASSWORD}@postgres:5432/reservas_db
      PUBLIC_URL: ${PUBLIC_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      # OAuth Office 365
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      SESSION_SECRET: ${SESSION_SECRET}
      # Teams Bot (opcional)
      MicrosoftAppId: ${MicrosoftAppId:-}
      MicrosoftAppPassword: ${MicrosoftAppPassword:-}
      DEFAULT_EMAIL_DOMAIN: ${DEFAULT_EMAIL_DOMAIN:-empresa.cl}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reservas_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: reservas-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - reservas_net

  gateway:
    image: nginx:1.27-alpine
    container_name: reservas-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - reservas_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: reservas-cloudflared
    restart: unless-stopped
    command: tunnel run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      gateway:
        condition: service_healthy
    networks:
      - reservas_net

volumes:
  postgres_data:

networks:
  reservas_net:
    driver: bridge
